<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Secretar-IA · Bia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#2F5D50; --sage:#8FAE8B; --terra:#C05B3C; --areia:#FAF5EF;
    --cafe:#3B2F2A; --cafe2:#6b5d54; --linha:#e7ddd0; --branco:#fffdfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:var(--areia);color:var(--cafe);height:100vh;overflow:hidden}
  h1,h2,h3,.serif{font-family:Fraunces,Georgia,serif}
  button{font-family:inherit;cursor:pointer;border:none}
  .hide{display:none!important}

  /* Login */
  #login{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--verde)}
  #login .card{background:var(--branco);padding:34px 30px;border-radius:22px;width:min(90vw,360px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  #login h1{color:var(--verde);font-size:30px;margin-bottom:4px}
  #login p{color:var(--cafe2);font-size:14px;margin-bottom:22px}
  #login input{width:100%;padding:14px;border:1.5px solid var(--linha);border-radius:12px;font-size:16px;text-align:center;margin-bottom:12px}
  #login button{width:100%;padding:14px;background:var(--terra);color:#fff;border-radius:12px;font-size:16px;font-weight:600}
  #login .erro{color:var(--terra);font-size:13px;height:16px;margin-top:8px}

  /* App */
  #app{height:100vh;display:flex;flex-direction:column}
  header{background:var(--verde);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header .logo{font-family:Fraunces;font-size:20px;font-weight:600}
  header .logo small{font-family:Inter;opacity:.7;font-weight:400;font-size:12px}
  .funil{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .kpi{background:rgba(255,255,255,.12);border-radius:10px;padding:5px 11px;text-align:center;min-width:64px}
  .kpi b{display:block;font-size:17px;font-family:Fraunces}
  .kpi span{font-size:10px;opacity:.85;text-transform:uppercase;letter-spacing:.4px}
  .kpi.meta{background:var(--terra)}

  .cols{flex:1;display:flex;min-height:0}
  .col{display:flex;flex-direction:column;min-height:0}
  .c1{width:320px;border-right:1px solid var(--linha);background:var(--branco)}
  .c2{flex:1;background:#efe7db}
  .c3{width:300px;border-left:1px solid var(--linha);background:var(--branco)}

  .busca{padding:10px;border-bottom:1px solid var(--linha)}
  .busca input{width:100%;padding:10px 12px;border:1px solid var(--linha);border-radius:10px;font-size:14px}
  .lista{flex:1;overflow-y:auto}
  .item{padding:12px 14px;border-bottom:1px solid var(--linha);cursor:pointer;display:flex;gap:10px}
  .item:hover{background:var(--areia)}
  .item.sel{background:#eef3ef;border-left:3px solid var(--verde)}
  .av{width:42px;height:42px;border-radius:50%;background:var(--sage);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-size:16px}
  .item .nome{font-weight:600;font-size:14px}
  .item .prev{font-size:12.5px;color:var(--cafe2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
  .tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
  .tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--sage);color:#123;font-weight:500}
  .tag.terra{background:var(--terra);color:#fff}
  .tag.humano{background:var(--cafe);color:#fff}

  /* chat */
  .chat-top{background:var(--branco);padding:11px 16px;border-bottom:1px solid var(--linha);display:flex;align-items:center;gap:10px}
  .chat-top .nome{font-weight:600}
  .chat-top .acts{margin-left:auto;display:flex;gap:8px}
  .btn{padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600}
  .btn.assumir{background:var(--terra);color:#fff}
  .btn.devolver{background:var(--verde);color:#fff}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .bolha{max-width:74%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.4;position:relative;white-space:pre-wrap;word-wrap:break-word}
  .lead{align-self:flex-start;background:#fff;border-bottom-left-radius:4px}
  .bia{align-self:flex-end;background:var(--verde);color:#fff;border-bottom-right-radius:4px}
  .humano{align-self:flex-end;background:var(--terra);color:#fff;border-bottom-right-radius:4px}
  .sistema{align-self:center;background:#e2d8c8;color:var(--cafe2);font-size:12px;border-radius:20px}
  .meta-b{font-size:10px;opacity:.7;margin-top:3px;text-align:right}
  .autor{font-size:10px;opacity:.75;margin-bottom:2px;font-weight:600}
  .compositor{background:var(--branco);padding:10px;border-top:1px solid var(--linha);display:flex;gap:8px}
  .compositor input{flex:1;padding:11px 14px;border:1px solid var(--linha);border-radius:22px;font-size:14px}
  .compositor button{background:var(--terra);color:#fff;width:44px;height:44px;border-radius:50%;font-size:18px}
  .compositor.off{opacity:.5;pointer-events:none}
  .vazio{flex:1;display:flex;align-items:center;justify-content:center;color:var(--cafe2);text-align:center;padding:20px;flex-direction:column;gap:8px}
  .vazio .big{font-family:Fraunces;font-size:22px;color:var(--verde)}

  /* ficha */
  .ficha{flex:1;overflow-y:auto;padding:16px}
  .ficha h3{color:var(--verde);font-size:15px;margin:16px 0 8px;font-family:Inter;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .ficha h3:first-child{margin-top:0}
  .campo{margin-bottom:9px}
  .campo label{font-size:11px;color:var(--cafe2);text-transform:uppercase;letter-spacing:.4px}
  .campo div{font-size:14px;margin-top:1px}
  .reuniao{background:#eef3ef;border-radius:12px;padding:12px;margin-top:6px}
  .reuniao a{color:var(--verde);font-weight:600;word-break:break-all;font-size:13px}
  .presenca{display:flex;gap:8px;margin-top:10px}
  .presenca button{flex:1;padding:9px;border-radius:9px;font-weight:600;font-size:13px;border:1.5px solid var(--linha);background:#fff}
  .presenca button.ok{background:var(--verde);color:#fff;border-color:var(--verde)}
  .presenca button.nao{background:#fff;color:var(--terra);border-color:var(--terra)}

  .voltar{display:none;background:none;color:#fff;font-size:22px}

  @media(max-width:820px){
    .c1{width:100%} .c3{display:none}
    .cols.ver-chat .c1{display:none}
    .cols:not(.ver-chat) .c2{display:none}
    .voltar{display:block}
    .funil{width:100%;order:3}
    header .logo{font-size:17px}
    .btn.ficha-btn{display:inline-block}
  }
  @media(min-width:821px){ .btn.ficha-btn{display:none} }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h1>Secretar-IA</h1>
    <p>o cockpit da Bia</p>
    <input id="senha" type="password" placeholder="senha" autocomplete="current-password">
    <button onclick="entrar()">entrar</button>
    <div class="erro" id="loginErro"></div>
  </div>
</div>

<div id="app" class="hide">
  <header>
    <button class="voltar" onclick="verLista()">‹</button>
    <div class="logo">Secretar-IA <small>· Bia</small></div>
    <div class="funil" id="funil"></div>
  </header>
  <div class="cols" id="cols">
    <div class="col c1">
      <div class="busca"><input id="busca" placeholder="buscar conversa..." oninput="render()"></div>
      <div class="lista" id="lista"></div>
    </div>
    <div class="col c2" id="c2">
      <div class="vazio" id="vazioChat">
        <div class="big">escolha uma conversa</div>
        <div>as mensagens aparecem aqui, ao vivo</div>
      </div>
    </div>
    <div class="col c3" id="c3">
      <div class="vazio"><div>ficha do lead</div></div>
    </div>
  </div>
</div>

<script>
var API='https://lyrbgggcqpacekdyeslh.supabase.co/functions/v1/painel-api';
var SENHA='', LEADS=[], SEL=null, DADOS=null, CONV=null, timer=null;

function h(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function iniciais(n){n=(n||'?').trim();var p=n.split(' ');return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase()}

async function api(acao,corpo){
  var r=await fetch(API+'?acao='+acao,{method:'POST',headers:{'content-type':'application/json','x-senha':SENHA},body:JSON.stringify(corpo||{})});
  return r.json();
}
async function entrar(){
  SENHA=document.getElementById('senha').value;
  var r=await api('login');
  if(r.ok){ localStorage.setItem('bia_senha',SENHA); document.getElementById('login').classList.add('hide'); document.getElementById('app').classList.remove('hide'); loop(); }
  else document.getElementById('loginErro').textContent='senha incorreta';
}
async function loop(){ await carregar(); if(SEL) await abrir(SEL,true); clearInterval(timer); timer=setInterval(tick,2500); }
async function tick(){ await carregar(); if(SEL) await abrir(SEL,true); }

async function carregar(){
  var r=await api('dados'); if(!r.ok)return;
  DADOS=r; LEADS=r.leads||[]; funil(r.funil); render();
}
function funil(f){
  if(!f)return;
  var pct=f.chegaram?Math.round(100*f.agendaram/f.chegaram):0;
  var el=document.getElementById('funil');
  el.innerHTML=
    kpi('chegaram',f.chegaram)+kpi('conversaram',f.conversaram)+
    kpi('agendaram',f.agendaram)+kpi('compareceram',f.compareceram)+
    '<div class="kpi meta"><b>'+pct+'%</b><span>meta 50%</span></div>';
}
function kpi(l,v){return '<div class="kpi"><b>'+v+'</b><span>'+l+'</span></div>'}

function render(){
  var q=(document.getElementById('busca').value||'').toLowerCase();
  var arr=LEADS.filter(function(l){return !q || ((l.nome||'')+(l.especialidade||'')+(l.cidade||'')+(l.telefone||'')).toLowerCase().indexOf(q)>=0});
  document.getElementById('lista').innerHTML=arr.map(function(l){
    var pv=l.previa?(l.previa.autor==='lead'?'':'✓ ')+(l.previa.conteudo||''):'—';
    var tags='';
    if(l.modo_conversa==='humano')tags+='<span class="tag humano">humano</span>';
    else tags+='<span class="tag">Bia</span>';
    if(l.estado==='agendou')tags+='<span class="tag terra">agendado</span>';
    if(l.especialidade)tags+='<span class="tag">'+h(l.especialidade)+'</span>';
    return '<div class="item '+(SEL===l.id?'sel':'')+'" onclick="abrir(\''+l.id+'\')">'+
      '<div class="av">'+iniciais(l.nome||l.telefone)+'</div>'+
      '<div style="min-width:0"><div class="nome">'+h(l.nome||l.telefone)+'</div>'+
      '<div class="prev">'+h(pv)+'</div><div class="tags">'+tags+'</div></div></div>';
  }).join('')||'<div style="padding:20px;color:var(--cafe2);text-align:center">nenhuma conversa ainda</div>';
}

async function abrir(id,silent){
  SEL=id; if(!silent){document.getElementById('cols').classList.add('ver-chat');}
  var r=await api('conversa',{lead_id:id}); if(!r.ok)return;
  CONV=r; render(); pintarChat(r); pintarFicha(r);
}
function pintarChat(r){
  var l=r.lead, humano=l.modo_conversa==='humano';
  var msgs=(r.mensagens||[]).map(function(m){
    var cls=m.autor;
    var rec=m.direcao==='outbound'?'<div class="meta-b">'+(m.status_entrega==='delivered'?'✓✓':m.status_entrega==='sent'?'✓':m.error_code?'⚠ '+h(m.error_code):'')+'</div>':'';
    var au=m.autor==='humano'?'<div class="autor">você</div>':m.autor==='bia'?'<div class="autor">Bia</div>':'';
    return '<div class="bolha '+cls+'">'+au+h(m.conteudo)+rec+'</div>';
  }).join('');
  document.getElementById('c2').innerHTML=
    '<div class="chat-top"><div class="av">'+iniciais(l.nome||l.telefone)+'</div>'+
    '<div><div class="nome">'+h(l.nome||l.telefone)+'</div><div style="font-size:11px;color:var(--cafe2)">'+h(l.telefone)+'</div></div>'+
    '<div class="acts">'+
      (humano?'<button class="btn devolver" onclick="devolver()">devolver p/ Bia</button>':'<button class="btn assumir" onclick="assumir()">assumir</button>')+
    '</div></div>'+
    '<div class="msgs" id="msgs">'+msgs+'</div>'+
    '<div class="compositor'+(humano?'':' off')+'"><input id="txt" placeholder="'+(humano?'escreva como você...':'assuma pra escrever')+'" onkeydown="if(event.key===\'Enter\')enviar()"><button onclick="enviar()">➤</button></div>';
  var mm=document.getElementById('msgs'); if(mm)mm.scrollTop=mm.scrollHeight;
}
function pintarFicha(r){
  var l=r.lead, a=r.agendamento;
  function c(lb,v){return '<div class="campo"><label>'+lb+'</label><div>'+h(v||'—')+'</div></div>'}
  var reun='';
  if(a){
    var dt=new Date(a.inicio).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    reun='<h3>Reunião</h3><div class="reuniao"><div style="font-weight:600">'+dt+'</div>'+
      (a.meet_url?'<a href="'+h(a.meet_url)+'" target="_blank">'+h(a.meet_url)+'</a>':'')+
      '<div class="presenca"><button class="'+(a.compareceu===true?'ok':'')+'" onclick="presenca(true)">compareceu</button>'+
      '<button class="'+(a.compareceu===false?'nao':'')+'" onclick="presenca(false)">não veio</button></div></div>';
  }
  document.getElementById('c3').innerHTML=
    '<div class="ficha"><h3>Diagnóstico</h3>'+
    c('especialidade',l.especialidade)+c('cidade',l.cidade)+c('faturamento',l.faturamento_faixa)+
    c('como chegam pacientes',l.como_chegam)+c('a dor',l.dor)+c('por que agora',l.motivo_agora)+
    '<h3>Lead</h3>'+c('estado',l.estado)+c('origem',l.origem)+c('instagram',l.instagram)+c('score',l.score)+
    reun+'</div>';
}
async function assumir(){await api('assumir',{lead_id:SEL});await abrir(SEL,true)}
async function devolver(){await api('devolver',{lead_id:SEL});await abrir(SEL,true)}
async function enviar(){
  var t=document.getElementById('txt'); if(!t||!t.value.trim())return;
  var v=t.value; t.value='';
  await api('enviar',{lead_id:SEL,texto:v}); await abrir(SEL,true);
}
async function presenca(ok){await api('compareceu',{lead_id:SEL,compareceu:ok});await abrir(SEL,true)}
function verLista(){document.getElementById('cols').classList.remove('ver-chat')}

var salva=localStorage.getItem('bia_senha');
if(salva){document.getElementById('senha').value=salva;entrar();}
</script>
</body>
</html>
